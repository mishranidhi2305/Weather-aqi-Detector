apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "weather-aqi.fullname" . }}-frontend
  labels:
    {{- include "weather-aqi.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "weather-aqi.selectorLabels" (merge (dict "component" "frontend") .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "weather-aqi.selectorLabels" (merge (dict "component" "frontend") .) | nindent 8 }}
    spec:
      serviceAccountName: {{ if .Values.serviceAccount.create }}{{ include "weather-aqi.fullname" . }}-frontend{{ else }}default{{ end }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: WEATHER_SERVICE_URL
              value: "{{ include "weather-aqi.fullname" . }}-weather:{{ .Values.env.weatherService.port }}"
            - name: AQI_SERVICE_URL
              value: "{{ include "weather-aqi.fullname" . }}-aqi:{{ .Values.env.aqiService.port }}"
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
