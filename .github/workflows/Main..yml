name: Build, Push & Deploy to EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  HELM_RELEASE_NAME: weather-dashboard
  HELM_NAMESPACE: default
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1 — Build & Push images to Docker Hub
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Frontend ──
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-aqi-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-aqi-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # ── Weather Service ──
      - name: Build & push weather-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/weather-service
          file: ./services/weather-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-aqi-weather-service:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-aqi-weather-service:latest
          cache-from: type=gha,scope=weather-service
          cache-to: type=gha,mode=max,scope=weather-service

      # ── AQI Service ──
      - name: Build & push aqi-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/aqi-service
          file: ./services/aqi-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-aqi-aqi-service:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-aqi-aqi-service:latest
          cache-from: type=gha,scope=aqi-service
          cache-to: type=gha,mode=max,scope=aqi-service

  # ──────────────────────────────────────────────
  # Job 2 — Deploy to EKS via Helm
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write   # required to request the OIDC token for AWS
      contents: read    # required for actions/checkout

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ./helm/aqi-weather \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --create-namespace \
            -f helm/aqi-weather/deployment.values.yaml \
            -f helm/aqi-weather/env.values.yaml \
            --set frontend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/weather-aqi-frontend \
            --set frontend.image.tag=${{ env.IMAGE_TAG }} \
            --set frontend.image.pullPolicy=Always \
            --set weatherService.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/weather-aqi-weather-service \
            --set weatherService.image.tag=${{ env.IMAGE_TAG }} \
            --set weatherService.image.pullPolicy=Always \
            --set aqiService.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/weather-aqi-aqi-service \
            --set aqiService.image.tag=${{ env.IMAGE_TAG }} \
            --set aqiService.image.pullPolicy=Always \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment -n ${{ env.HELM_NAMESPACE }} --timeout=3m
          kubectl get pods -n ${{ env.HELM_NAMESPACE }}
