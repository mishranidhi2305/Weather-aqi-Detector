apiVersion: v1
kind: Service
metadata:
  name: {{ include "weather-aqi.fullname" . }}-frontend
  labels:
    {{- include "weather-aqi.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "weather-aqi.selectorLabels" (merge (dict "component" "frontend") .) | nindent 4 }}
