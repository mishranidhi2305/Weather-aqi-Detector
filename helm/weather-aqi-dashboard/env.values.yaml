# ============================================================
# env.values.yaml
# Environment-specific configuration.
# Create one file per environment (dev, staging, prod) and
# pass with:  -f env.values.yaml  at helm install / upgrade.
# ============================================================

env:
  # Node.js runtime environment
  nodeEnv: production

  # Weather Service
  weatherService:
    port: 3001

  # AQI Service
  aqiService:
    port: 3002

# ---------------------------------------------------------------
# IRSA — IAM role ARNs per environment.
# These override the empty defaults in deployment.values.yaml.
#
# How to get the ARN after creating the role (see setup steps):
#   aws iam get-role --role-name weather-weather-service-role \
#       --query Role.Arn --output text
# ---------------------------------------------------------------
serviceAccount:
  weatherService:
    # arn:aws:iam::<ACCOUNT_ID>:role/<ROLE_NAME>
    iamRoleArn: ""
  aqiService:
    iamRoleArn: ""
  frontend:
    iamRoleArn: ""
