version: '3.8'

services:
  weather-service:
    build: ./services/weather-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    restart: unless-stopped

  aqi-service:
    build: ./services/aqi-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      - WEATHER_SERVICE_URL=weather-service:3001
      - AQI_SERVICE_URL=aqi-service:3002
    depends_on:
      - weather-service
      - aqi-service
    restart: unless-stopped
