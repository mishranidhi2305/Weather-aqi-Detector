{{- if .Values.serviceAccount.create }}
# -----------------------------------------------
# ServiceAccount: weather-service
# -----------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "weather-aqi.fullname" . }}-weather
  labels:
    {{- include "weather-aqi.labels" . | nindent 4 }}
    app.kubernetes.io/component: weather
  {{- if .Values.serviceAccount.weatherService.iamRoleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.weatherService.iamRoleArn | quote }}
  {{- end }}
automountServiceAccountToken: true
---
# -----------------------------------------------
# ServiceAccount: aqi-service
# -----------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "weather-aqi.fullname" . }}-aqi
  labels:
    {{- include "weather-aqi.labels" . | nindent 4 }}
    app.kubernetes.io/component: aqi
  {{- if .Values.serviceAccount.aqiService.iamRoleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.aqiService.iamRoleArn | quote }}
  {{- end }}
automountServiceAccountToken: true
---
# -----------------------------------------------
# ServiceAccount: frontend
# -----------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "weather-aqi.fullname" . }}-frontend
  labels:
    {{- include "weather-aqi.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  {{- if .Values.serviceAccount.frontend.iamRoleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.frontend.iamRoleArn | quote }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
